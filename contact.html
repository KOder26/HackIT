<main>
  <h2>Contact Us</h2>
  <p>Got feedback or questions? Fill in the form below.</p>

  <form class="contact-form" onsubmit="handleSubmit(event)">
    <label for="name">Name</label>
    <input id="name" type="text" placeholder="Your name" required>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="your@email.com" required>

    <label for="subject">Subject</label>
    <input id="subject" type="text" placeholder="What is this about?" required>

    <label for="message">Message</label>
    <textarea id="message" placeholder="Write your message here..." required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p id="form-msg" style="display:none; color: green; margin-top: 12px;">Message sent! We will get back to you soon.</p>
</main>

</footer>

<script src="game.js"></script>
<script>
  function handleSubmit(e) {
    e.preventDefault();
    document.getElementById("form-msg").style.display = "block";
    e.target.reset();
  }
</script>
