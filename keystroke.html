<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hack It! - Keystroke Test</title>

</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <img src="Logo.png" alt="Hack It! logo" class="logo-img">
    <a href="index.html">Home</a>

  <div class="nav-right">
    <button id="themeToggle" class="theme-btn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q150 0 255 105t105 255q0 150-105 255t-255 105Zm0-80q111 0 185.5-74.5T740-480q0-111-74.5-185.5T480-740q-111 0-185.5 74.5T220-480q0 111 74.5 185.5T480-200Zm0-60q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-260Zm-180-200h360v-60H300v60Zm0 120h360v-60H300v60Z"/></svg></button>
    <a href="profile.html">Profile</a>

<main>
  <h2>Keystroke Test</h2>

  <div class="box">
    <p>Start typing to test your keystroke speed.</p>

    <input 
      type="text" 
      id="typingInput" 
      placeholder="Type here..." 
      autocomplete="off"
      autofocus
    >

    <p>Keystrokes: <span id="keyCount">0</span></p>
    <p>Time: <span id="time">0.00</span>s</p>
    <p>Keys per second: <span id="kps">0.00</span></p>
    
    <div style="margin-top: 20px;">
      <button id="resetBtn" onclick="resetTest()">Reset</button>
    </div>
  </div>
</main>

<footer>
  <p>© Hack It! Training Platform</p>
</footer>

<script>
  let startTime = null;
  let keystrokes = 0;
  let timerInterval = null;
  let isActive = false;
  const typingInput = document.getElementById('typingInput');
  const keyCount = document.getElementById('keyCount');
  const timeDisplay = document.getElementById('time');
  const kpsDisplay = document.getElementById('kps');

  function startTest() {
    if (isActive) return;
    
    isActive = true;
    startTime = Date.now();
    keystrokes = 0;
    typingInput.value = '';
    typingInput.focus();
    
    updateDisplay();
    startTimer();
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
      if (!isActive) return;
      
      const currentTime = (Date.now() - startTime) / 1000;
      const kps = keystrokes / currentTime;
      
      timeDisplay.textContent = currentTime.toFixed(2);
      kpsDisplay.textContent = kps.toFixed(2);
    }, 50); // upd every 50ms
  }

  function updateDisplay() {
    keyCount.textContent = keystrokes;
  }

  function resetTest() {
    isActive = false;
    keystrokes = 0;
    startTime = null;
    typingInput.value = '';
    
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    
    keyCount.textContent = '0';
    timeDisplay.textContent = '0.00';
    kpsDisplay.textContent = '0.00';
  }

  // listens for keystrokes
  typingInput.addEventListener('keydown', (e) => {
    if (!isActive) {
      startTest();
      return;
    }
    
    // counts only char keys
    if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Delete') {
      keystrokes++;
      updateDisplay();
    }
  });
  typingInput.addEventListener('blur', () => {
    isActive = false;
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  });

  // --- Dark Mode Logic ---
  const themeToggleBtn = document.getElementById("themeToggle");
  const darkModeIcon = `<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q150 0 255 105t105 255q0 150-105 255t-255 105Zm0-80q111 0 185.5-74.5T740-480q0-111-74.5-185.5T480-740q-111 0-185.5 74.5T220-480q0 111 74.5 185.5T480-200Zm0-60q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-260Zm-180-200h360v-60H300v60Zm0 120h360v-60H300v60Z"/></svg>`;
  const lightModeIcon = `<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0h-160v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-113-113 57-57 113 113-57 57Zm494 494l-113-113 57-57 113 113-57 57ZM150-200l-57-57 113-113 57 57-113 113Zm544-544l113-113 57 57-113 113-57-57Z"/></svg>`;

  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
    if (themeToggleBtn) themeToggleBtn.innerHTML = `${lightModeIcon} Light Mode`;
  }

  if (themeToggleBtn) {
    themeToggleBtn.addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      if (currentTheme === "dark") {
        document.documentElement.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
        themeToggleBtn.innerHTML = `${darkModeIcon} Dark Mode`;
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        themeToggleBtn.innerHTML = `${lightModeIcon} Light Mode`;
      }
    });
  }

  // Initialize
  resetTest();
</script>
<script src="game.js"></script>
</body>
</html>
